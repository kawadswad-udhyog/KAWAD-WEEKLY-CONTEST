<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kawad Swad Contest</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Baloo+2:wght@600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#fff176,#fff8e7);
    text-align: center;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    background: white;
}

.logo { width: 45px; }

.brand {
    font-family: 'Baloo 2';
    font-size: 20px;
}

/* HERO */
.hero {
    padding: 20px;
}

.hero h1 {
    font-family: 'Baloo 2';
}

/* WHEEL */
.wheel-container {
    position: relative;
    width: 230px;
    height: 230px;
    margin: auto;
}

.wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: conic-gradient(#ff9800,#4caf50,#f44336,#2196f3);
    transition: transform 3s ease-out;
}

.pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
}

/* BUTTON */
.spin-btn {
    background: #ff5722;
    color: white;
    padding: 14px 28px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    margin-top: 15px;
    cursor: pointer;
    animation: glow 1.5s infinite;
}

@keyframes glow {
    0% { box-shadow: 0 0 5px #ff5722; }
    50% { box-shadow: 0 0 20px #ff5722; }
    100% { box-shadow: 0 0 5px #ff5722; }
}

/* POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) scale(0);
    background: white;
    padding: 25px;
    border-radius: 12px;
    z-index: 1000;
    transition: 0.3s;
}

.popup.active {
    transform: translate(-50%,-50%) scale(1);
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: red;
    top: 0;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* WHATSAPP */
.whatsapp-btn {
    background:#25D366;
    color:white;
    padding:10px 18px;
    border-radius:25px;
    text-decoration:none;
    display:inline-block;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" class="logo">
    <div class="brand">Kawad Swad</div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>🎡 Spin & Win पापड़</h1>
    <p>आज ही अपनी किस्मत आजमाओ</p>

    <div class="wheel-container">
        <div class="pointer">🔻</div>
        <div class="wheel" id="wheel"></div>
    </div>

    <button class="spin-btn" onclick="spin()">SPIN NOW</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <h2 id="popupText"></h2>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfUk2Ta-PbxvVmDXzQ_0tESjehJ4y-2unPIi8mQd-JdqQUzeQ/viewform?usp=header" class="whatsapp-btn">
        Enter Contest
    </a>
</div>

<!-- CONTACT -->
<section>
    <h3>Order on WhatsApp</h3>
    <a class="whatsapp-btn" href="https://wa.me/919630976867">9630976867</a>
</section>

<script>
function spin() {
    let wheel = document.getElementById("wheel");
    let popup = document.getElementById("popup");
    let text = document.getElementById("popupText");

    let deg = Math.floor(3600 + Math.random()*360);
    wheel.style.transform = "rotate("+deg+"deg)";

    setTimeout(()=>{
        let msgs = [
            "🎉 आप जीतने के लिए चुने गए हैं!",
            "🔥 Lucky Entry मिल गई!",
            "🎁 Reward Chance Unlock!"
        ];
        text.innerHTML = msgs[Math.floor(Math.random()*msgs.length)];
        popup.classList.add("active");
        confetti();
        playSound();
    },3000);
}

function confetti(){
    for(let i=0;i<30;i++){
        let c = document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"%";
        c.style.background=["red","yellow","green","blue"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
    }
}

function playSound(){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
    audio.play();
}
</script>

</body>
</html>
